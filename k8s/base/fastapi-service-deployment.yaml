apiVersion: apps/v1
kind: Deployment
metadata:
  name: fastapi-service
  namespace: service-launchpad-dev
  labels:
    app.kubernetes.io/name: fastapi-service
    app.kubernetes.io/component: inference-simulator
    app.kubernetes.io/part-of: service-launchpad
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: fastapi-service
  template:
    metadata:
      labels:
        app.kubernetes.io/name: fastapi-service
        app.kubernetes.io/component: inference-simulator
        app.kubernetes.io/part-of: service-launchpad
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: /metrics
        prometheus.io/port: "8000"
    spec:
      containers:
        - name: fastapi-service
          image: service-launchpad/fastapi-service:dev
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8000
          envFrom:
            - configMapRef:
                name: fastapi-service-config
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
