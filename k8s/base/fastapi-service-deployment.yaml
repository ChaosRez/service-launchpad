apiVersion: apps/v1
kind: Deployment
metadata:
  name: fastapi-service
  namespace: service-launchpad-dev
  labels:
    app.kubernetes.io/name: fastapi-service
    app.kubernetes.io/component: inference-simulator
    app.kubernetes.io/part-of: service-launchpad
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: fastapi-service
  template:
    metadata:
      labels:
        app.kubernetes.io/name: fastapi-service
        app.kubernetes.io/component: inference-simulator
        app.kubernetes.io/part-of: service-launchpad
    spec:
      containers:
        - name: fastapi-service
          image: service-launchpad/fastapi-service:dev
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8000
          envFrom:
            - configMapRef:
                name: fastapi-service-config
          startupProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 2
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 12
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 15
            timeoutSeconds: 2
            failureThreshold: 10
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 1000m
              memory: 256Mi
