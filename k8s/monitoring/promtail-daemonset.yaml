apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: promtail
  namespace: service-launchpad-observability
  labels:
    app.kubernetes.io/name: promtail
    app.kubernetes.io/component: log-shipper
    app.kubernetes.io/part-of: service-launchpad
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: promtail
  template:
    metadata:
      labels:
        app.kubernetes.io/name: promtail
        app.kubernetes.io/component: log-shipper
        app.kubernetes.io/part-of: service-launchpad
    spec:
      serviceAccountName: promtail
      containers:
        - name: promtail
          image: grafana/promtail:2.9.8
          command:
            - /bin/sh
            - -c
          args:
            - export HOSTNAME="${NODE_NAME}" && exec /usr/bin/promtail -config.file=/etc/promtail/promtail.yaml
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          ports:
            - name: http-metrics
              containerPort: 9080
          volumeMounts:
            - name: config
              mountPath: /etc/promtail
            - name: positions
              mountPath: /run/promtail
            - name: varlog
              mountPath: /var/log
              readOnly: true
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
      volumes:
        - name: config
          configMap:
            name: promtail-config
        - name: positions
          emptyDir: {}
        - name: varlog
          hostPath:
            path: /var/log
            type: Directory
