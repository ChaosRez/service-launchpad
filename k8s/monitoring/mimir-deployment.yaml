apiVersion: apps/v1
kind: Deployment
metadata:
  name: mimir
  namespace: service-launchpad-observability
  labels:
    app.kubernetes.io/name: mimir
    app.kubernetes.io/component: long-term-metrics-store
    app.kubernetes.io/part-of: service-launchpad
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: mimir
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mimir
        app.kubernetes.io/component: long-term-metrics-store
        app.kubernetes.io/part-of: service-launchpad
    spec:
      initContainers:
        - name: create-dirs
          image: busybox:latest
          command: ['sh', '-c', 'mkdir -p /mimir/data/rules && chown -R 10001:10001 /mimir/data']
          volumeMounts:
            - name: data
              mountPath: /mimir/data
      containers:
        - name: mimir
          image: grafana/mimir:2.17.3
          args:
            - -target=all
            - -config.file=/etc/mimir/mimir.yaml
            - -auth.multitenancy-enabled=false
          ports:
            - name: http
              containerPort: 9009
            - name: grpc
              containerPort: 9095
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 12
          livenessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 8
          volumeMounts:
            - name: config
              mountPath: /etc/mimir
            - name: data
              mountPath: /mimir/data
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1536Mi
      volumes:
        - name: config
          configMap:
            name: mimir-config
        - name: data
          emptyDir: {}
