apiVersion: v1
kind: ConfigMap
metadata:
  name: victoriametrics-config
  namespace: service-launchpad-observability
  labels:
    app.kubernetes.io/name: victoriametrics
    app.kubernetes.io/part-of: service-launchpad
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
    scrape_configs:
      - job_name: victoriametrics
        static_configs:
          - targets:
              - localhost:8428
      - job_name: kube-state-metrics
        static_configs:
          - targets:
              - kube-state-metrics.service-launchpad-observability.svc.cluster.local:8080
      - job_name: fastapi-service
        metrics_path: /metrics
        static_configs:
          - targets:
              - fastapi-service.service-launchpad-dev.svc.cluster.local:8000
