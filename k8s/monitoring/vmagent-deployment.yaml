apiVersion: apps/v1
kind: Deployment
metadata:
  name: vmagent
  namespace: service-launchpad-observability
  labels:
    app.kubernetes.io/name: vmagent
    app.kubernetes.io/component: metrics-agent
    app.kubernetes.io/part-of: service-launchpad
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: vmagent
  template:
    metadata:
      labels:
        app.kubernetes.io/name: vmagent
        app.kubernetes.io/component: metrics-agent
        app.kubernetes.io/part-of: service-launchpad
    spec:
      containers:
        - name: vmagent
          image: victoriametrics/vmagent:v1.102.1
          args:
            - -promscrape.config=/etc/vmagent/prometheus.yml
            - -remoteWrite.url=http://victoriametrics.service-launchpad-observability.svc.cluster.local:8428/api/v1/write
            - -remoteWrite.url=http://mimir.service-launchpad-observability.svc.cluster.local:9009/api/v1/push
            - -remoteWrite.tmpDataPath=/vmagent-data
          ports:
            - name: http
              containerPort: 8429
          readinessProbe:
            httpGet:
              path: /metrics
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /metrics
              port: http
            initialDelaySeconds: 15
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 8
          volumeMounts:
            - name: config
              mountPath: /etc/vmagent
            - name: data
              mountPath: /vmagent-data
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: config
          configMap:
            name: vmagent-config
        - name: data
          emptyDir: {}
