apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-providers
  namespace: service-launchpad-observability
  labels:
    app.kubernetes.io/name: grafana
    app.kubernetes.io/part-of: service-launchpad
data:
  dashboards.yaml: |
    apiVersion: 1
    providers:
      - name: service-launchpad
        orgId: 1
        folder: Service Launchpad
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /var/lib/grafana/dashboards/service-launchpad
