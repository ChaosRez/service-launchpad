apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: service-launchpad-observability
  labels:
    app.kubernetes.io/name: grafana
    app.kubernetes.io/part-of: service-launchpad
data:
  datasources.yaml: |
    apiVersion: 1
    datasources:
      - name: VictoriaMetrics
        type: prometheus
        access: proxy
        url: http://victoriametrics.service-launchpad-observability.svc.cluster.local:8428
        isDefault: true
      - name: Tempo
        type: tempo
        access: proxy
        url: http://tempo.service-launchpad-observability.svc.cluster.local:3200
