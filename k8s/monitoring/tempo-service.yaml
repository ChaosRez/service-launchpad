apiVersion: v1
kind: Service
metadata:
  name: tempo
  namespace: service-launchpad-observability
  labels:
    app.kubernetes.io/name: tempo
    app.kubernetes.io/component: tracing-backend
    app.kubernetes.io/part-of: service-launchpad
spec:
  selector:
    app.kubernetes.io/name: tempo
  ports:
    - name: http
      port: 3200
      targetPort: http
    - name: otlp-http
      port: 4318
      targetPort: otlp-http
    - name: otlp-grpc
      port: 4317
      targetPort: otlp-grpc
  type: ClusterIP
