apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  # Binds the kube-state-metrics ServiceAccount to the read-only ClusterRole above.
  name: service-launchpad-kube-state-metrics
  labels:
    app.kubernetes.io/name: kube-state-metrics
    app.kubernetes.io/part-of: service-launchpad
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: service-launchpad-kube-state-metrics
subjects:
  - kind: ServiceAccount
    name: kube-state-metrics
    namespace: service-launchpad-observability
