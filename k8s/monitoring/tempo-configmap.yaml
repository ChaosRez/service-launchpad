apiVersion: v1
kind: ConfigMap
metadata:
  name: tempo-config
  namespace: service-launchpad-observability
  labels:
    app.kubernetes.io/name: tempo
    app.kubernetes.io/part-of: service-launchpad
data:
  tempo.yaml: |
    server:
      http_listen_port: 3200
    distributor:
      receivers:
        otlp:
          protocols:
            grpc:
            http:
    ingester:
      max_block_duration: 5m
    compactor:
      compaction:
        block_retention: 24h
    storage:
      trace:
        backend: local
        local:
          path: /var/tempo/traces
        wal:
          path: /var/tempo/wal
