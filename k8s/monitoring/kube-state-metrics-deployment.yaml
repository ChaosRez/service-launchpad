apiVersion: apps/v1
kind: Deployment
metadata:
  name: kube-state-metrics
  namespace: service-launchpad-observability
  labels:
    app.kubernetes.io/name: kube-state-metrics
    app.kubernetes.io/component: cluster-metadata
    app.kubernetes.io/part-of: service-launchpad
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: kube-state-metrics
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kube-state-metrics
        app.kubernetes.io/component: cluster-metadata
        app.kubernetes.io/part-of: service-launchpad
    spec:
      serviceAccountName: kube-state-metrics
      containers:
        - name: kube-state-metrics
          image: registry.k8s.io/kube-state-metrics/kube-state-metrics:v2.13.0
          args:
            - --resources=pods,deployments,horizontalpodautoscalers,namespaces
          ports:
            - name: http
              containerPort: 8080
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi
