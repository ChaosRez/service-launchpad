apiVersion: apps/v1
kind: Deployment
metadata:
  name: victoriametrics
  namespace: service-launchpad-observability
  labels:
    app.kubernetes.io/name: victoriametrics
    app.kubernetes.io/component: metrics-store
    app.kubernetes.io/part-of: service-launchpad
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: victoriametrics
  template:
    metadata:
      labels:
        app.kubernetes.io/name: victoriametrics
        app.kubernetes.io/component: metrics-store
        app.kubernetes.io/part-of: service-launchpad
    spec:
      containers:
        - name: victoriametrics
          image: victoriametrics/victoria-metrics:v1.102.1
          args:
            - -promscrape.config=/etc/victoriametrics/prometheus.yml
            - -storageDataPath=/victoria-metrics-data
          ports:
            - name: http
              containerPort: 8428
          volumeMounts:
            - name: config
              mountPath: /etc/victoriametrics
            - name: data
              mountPath: /victoria-metrics-data
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: config
          configMap:
            name: victoriametrics-config
        - name: data
          emptyDir: {}
